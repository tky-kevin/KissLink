name: Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # 需要寫入權限才能建立 Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 專案已含 gradle wrapper（8.13）；CI 仍用 action 安裝對應 Gradle 並以 `gradle` 指令建置。
      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: 安卓抓普 v1.0.${{ github.run_number }}
          body: |
            自動建置的正式版 APK（以 debug key 簽署，可直接安裝）。
            Commit: ${{ github.sha }}
          files: app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
